<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivial</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <section id="welcome-screen">
        <div class="welcome-container">
            <h1 class="title-quiz">¡Quiz Trivial!</h1>
            <img class="img-quiz" src="./img/trivial-imagen.png" alt="Imagen gráfica de preguntas trivial">
            <p class="description-quiz">¿Quieres poner a prueba lo que sabes de cultura general? ¡Adelante, presiona en comenzar!</p>
            <button id="btn-quiz" class="btn-quiz"">Empezar quiz</button>
        </div>
    </section>

    <section id="question-screen">
        <div class="question-container">
            <h2 class="question-title">1. ¿Cuáles son los cinco tipos de sabores primarios?</h2>
            <div class="questions">
                <p>A. Dulce, amargo, ácido, salado y umami</p>
            </div>
        </div>
    </section>
    <section id="result-screen"></section>
    
    <!--JAVASCRIPT-->
    <script src="main.js"></script>
</body>
</html>
