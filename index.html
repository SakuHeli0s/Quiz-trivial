<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivial Quiz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!------PANTALLA BIENVENIDA------>
    <section id="welcome-screen">
        <div class="welcome-container">
            <h1 class="title-quiz">¡Quiz Trivial!</h1>
            <img class="img-quiz" src="./img/trivial-imagen.png" alt="Imagen gráfica de preguntas trivial">
            <p class="description-quiz">¿Quieres poner a prueba lo que sabes de cultura general? ¡Adelante, presiona en comenzar!</p>
            <button id="btn-quiz" class="btn-quiz">Comenzar quiz</button>
        </div>
    </section>

    <!------PANTALLA PREGUNTAS------>
    <section id="question-screen">
        <div class="question-container">
            <span id="number-questions" class="number-questions"></span>
            <h2 class="question-title"></h2>
            <div class="questions">
                <button class="btn-question" data-respuesta="A"></button>
                <button class="btn-question" data-respuesta="B"></button>
                <button class="btn-question" data-respuesta="C"></button>
                <button class="btn-question" data-respuesta="D"></button>
            </div>

            <p id="status-answer"></p>

            <button id="btn-next" class="btn-next">Siguiente pregunta</button>
        </div>
    </section>

    <!------PANTALLA RESULTADOS------>
    <section id="result-screen">
        <div class="result-screen-container">
            <h1 class="result-title">Resultados</h1>

            <div id="total-result"></div>

    <div class="btn-container">
        <button id="btn-play-again" class="btn-play-again">Jugar otra vez</button>
        <button id="btn-home" class="btn-home">Ir a inicio</button>
    </div>
        </div>
    </section>
    
    <!--JAVASCRIPT-->
    <script src="main.js"></script>
</body>
</html>
